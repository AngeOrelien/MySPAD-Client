name: spadcameroun
description: "A Flutter Project for SPAD CAMEROUN App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Added dependencies
  go_router: ^14.0.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Added dev_dependency
  flutter_launcher_icons: ^0.14.0

# Added icon configuration
flutter_launcher_icons:
  image_path: "assets/images/logo_spad.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_spad.png"
  web:
    generate: true
    image_path: "assets/images/logo_spad.png"
  windows:
    generate: true
    image_path: "assets/images/logo_spad.png"
  linux:
    generate: true
    image_path: "assets/images/logo_spad.png"

flutter:
  uses-material-design: true

  # Added assets
  assets:
    - assets/images/
    - assets/fonts/

  # Added fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
